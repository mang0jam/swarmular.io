<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swarmular.io — Grow Your Swarm</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  #title {
    font-family: 'Patrick Hand SC', cursive;
    font-size: clamp(2.5rem, 7vw, 5rem);
    color: #dcc490;
    letter-spacing: 0.15em;
    margin-bottom: 0.2em;
  }
  #subtitle {
    font-family: monospace;
    font-size: clamp(0.55rem, 1.4vw, 0.8rem);
    color: #555;
    letter-spacing: 0.35em;
    margin-bottom: 0.4em;
  }
  #solid-label {
    position: fixed; bottom: 2rem; right: 2.5rem;
    font-family: 'Patrick Hand SC', cursive;
    font-size: 1.3rem;
    color: rgba(100, 200, 180, 0);
    letter-spacing: 0.1em;
    pointer-events: none; z-index: 10;
  }
  #logo {
    position: fixed; bottom: 0; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding-bottom: clamp(2rem, 5vh, 4rem);
    pointer-events: none; z-index: 10;
  }
  #logo-title {
    font-family: 'Patrick Hand SC', cursive;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    color: #dcc490;
    letter-spacing: 0.15em;
    margin-bottom: 0.15em;
  }
  #logo-sub {
    font-family: monospace;
    font-size: clamp(0.5rem, 1.2vw, 0.75rem);
    color: #555;
    letter-spacing: 0.35em;
    margin-bottom: 0.5em;
  }
  #logo-seed { opacity: 0.22; }
  #coming-soon {
    position: fixed; bottom: 0.8rem; left: 50%; transform: translateX(-50%);
    font-family: monospace;
    font-size: clamp(0.45rem, 1vw, 0.6rem);
    color: #333;
    letter-spacing: 0.3em;
    pointer-events: none; z-index: 10;
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="logo">
  <div id="logo-title">SWARMULAR</div>
  <div id="logo-sub">GROW · SURVIVE · THRIVE</div>
  <svg id="logo-seed" width="40" height="40" viewBox="-20 -20 40 40">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="6.9" cy="-4" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="6.9" cy="4" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="0" cy="8" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="-6.9" cy="4" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
    <circle cx="-6.9" cy="-4" r="8" fill="none" stroke="#dcc490" stroke-width="0.8"/>
  </svg>
</div>
<div id="coming-soon">COMING SOON</div>

<script src="app.js"></script>
</body>
</html>
